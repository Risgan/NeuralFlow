<div class="min-h-screen flex flex-col bg-neutral-50 dark:bg-neutral-950">
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-neutral-950/80 backdrop-blur-md border-b border-neutral-200 dark:border-neutral-800">
    <div class="max-w-2xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
          <mat-icon class="text-xl">bolt</mat-icon>
        </div>
        <div class="flex flex-col">
          <span class="font-bold tracking-tight text-lg leading-none">Neural Flow</span>
          <span class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">System Active</span>
        </div>
      </div>

      <button (click)="themeService.toggle()" class="p-2.5 rounded-xl bg-neutral-100 dark:bg-neutral-900 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors">
        <mat-icon class="text-xl">{{ themeService.darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 max-w-2xl w-full mx-auto px-6 pt-6 pb-24">
    <router-outlet></router-outlet>
  </main>

  <!-- Bottom Navigation (Mobile First) -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 dark:bg-neutral-950/90 backdrop-blur-lg border-t border-neutral-200 dark:border-neutral-800 pb-safe">
    <div class="max-w-2xl mx-auto px-6 h-16 flex items-center justify-around">
      <a routerLink="/" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}"
         class="flex flex-col items-center gap-1 text-neutral-400 transition-colors">
        <mat-icon>dashboard</mat-icon>
        <span class="text-[10px] font-medium uppercase tracking-wider">Hoy</span>
      </a>
      <a routerLink="/manage" routerLinkActive="text-primary"
         class="flex flex-col items-center gap-1 text-neutral-400 transition-colors">
        <mat-icon>list_alt</mat-icon>
        <span class="text-[10px] font-medium uppercase tracking-wider">Tareas</span>
      </a>
      <a routerLink="/history" routerLinkActive="text-primary"
         class="flex flex-col items-center gap-1 text-neutral-400 transition-colors">
        <mat-icon>history</mat-icon>
        <span class="text-[10px] font-medium uppercase tracking-wider">Log</span>
      </a>
    </div>
  </nav>
</div>
